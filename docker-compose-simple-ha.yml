version: '3.8'

services:
  # MySQL Primary (optimized for 1000+ connections)
  mysql-primary:
    image: mysql:8.0
    container_name: mysql_primary
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3310:3306"
    volumes:
      - mysql_primary_data:/var/lib/mysql
      - ./config/mysql-optimized.cnf:/etc/mysql/conf.d/mysql-optimized.cnf
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: '4'
        reservations:
          memory: 4G
          cpus: '2'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      timeout: 20s
      retries: 10
      start_period: 30s

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: always
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'

  # HAProxy for load balancing
  haproxy:
    image: haproxy:2.8
    container_name: haproxy_lb
    restart: always
    ports:
      - "3356:3306"  # Your original port
      - "8082:8080"  # Stats interface
    volumes:
      - ./config/haproxy-simple.cfg:/usr/local/etc/haproxy/haproxy.cfg
    depends_on:
      mysql-primary:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

networks:
  backend:
    driver: bridge

volumes:
  mysql_primary_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/backups-disk2/mysql-primary
  redis_data:
