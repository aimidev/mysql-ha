global
    daemon
    maxconn 4096
    log stdout local0
    
defaults
    mode tcp
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms
    option tcplog

# Stats interface
listen stats
    bind *:8080
    mode http
    stats enable
    stats uri /stats
    stats refresh 30s
    stats admin if TRUE

# MySQL Load Balancer
listen mysql-cluster
    bind *:3306
    mode tcp
    balance roundrobin
    
    server mysql-primary mysql-primary:3306 weight 100 maxconn 2000
