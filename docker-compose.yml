#version: '3.8'

services:
  # MySQL Master
  mysql-master:
    image: mysql:8.0
    container_name: mysql_master
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_REPLICATION_USER: replicator
      MYSQL_REPLICATION_PASSWORD: ${MYSQL_REPLICATION_PASSWORD}
    ports:
      - "3310:3306"
    volumes:
      - mysql_master_data_2026:/var/lib/mysql
      - ./config/master.cnf:/etc/mysql/conf.d/master.cnf
      - ./init-master.sql:/docker-entrypoint-initdb.d/init-master.sql
    command: --server-id=1 --log-bin=mysql-bin --binlog-do-db=${MYSQL_DATABASE}
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
        reservations:
          memory: 2G
          cpus: '1'

  # MySQL Slave 1
  mysql-slave1:
    image: mysql:8.0
    container_name: mysql_slave1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_slave1_data_2026:/var/lib/mysql
      - ./config/slave.cnf:/etc/mysql/conf.d/slave.cnf
    command: --server-id=2 --relay-log=mysql-relay-bin --log-slave-updates=1 --read-only=1
    depends_on:
      - mysql-master
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
        reservations:
          memory: 2G
          cpus: '1'

  # MySQL Slave 2
  mysql-slave2:
    image: mysql:8.0
    container_name: mysql_slave2
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3308:3306"
    volumes:
      - mysql_slave2_data_2026:/var/lib/mysql
      - ./config/slave.cnf:/etc/mysql/conf.d/slave.cnf
    command: --server-id=3 --relay-log=mysql-relay-bin --log-slave-updates=1 --read-only=1
    depends_on:
      - mysql-master
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
        reservations:
          memory: 2G
          cpus: '1'

  # ProxySQL for connection pooling and load balancing
  proxysql:
    image: proxysql/proxysql:latest
    container_name: proxysql
    restart: always
    ports:
      - "6033:6033"  # MySQL interface
      - "6032:6032"  # Admin interface
    volumes:
      - ./config/proxysql.cnf:/etc/proxysql.cnf
      - proxysql_data:/var/lib/proxysql
    depends_on:
      - mysql-master
      - mysql-slave1
      - mysql-slave2
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: always
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'

  # HAProxy for load balancing (optional)
  haproxy:
    image: haproxy:2.8
    container_name: haproxy_lb
    restart: always
    ports:
      - "3357:3306"  # MySQL interface
      - "8081:8080"  # Stats interface
    volumes:
      - ./config/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg
    depends_on:
      - proxysql
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

networks:
  backend:
    driver: bridge

volumes:
  mysql_master_data_2026:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/backups-disk2/mysql-master
  mysql_slave1_data_2026:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/backups-disk2/mysql-slave1
  mysql_slave2_data_2026:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/backups-disk2/mysql-slave2
  proxysql_data:
  redis_data:
